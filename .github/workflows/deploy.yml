name: deploy

# Manual, gated deployment to Vertex AI Pipelines (serverless). This is the ONLY
# workflow permitted to submit runs. Uses Workload Identity Federation (no
# long-lived JSON keys). Triggered manually or on a schedule.
on:
  workflow_dispatch:
    inputs:
      pipeline:
        description: "Pipeline to deploy"
        required: true
        default: "data"
        type: choice
        options: [data, training]
      mode:
        description: "submit (one run) or schedule (recurring cron)"
        required: true
        default: "submit"
        type: choice
        options: [submit, schedule]
      cron:
        description: "Cron expression (only used when mode=schedule)"
        required: false
        default: "0 6 * * 1"

permissions:
  contents: read
  id-token: write  # Required for Workload Identity Federation.

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod  # Add required reviewers here for a manual gate.
    steps:
      - uses: actions/checkout@v4

      - name: Install uv (pinned) + project Python
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: uv sync --extra data --extra tracking

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/238048619124/locations/global/workloadIdentityPools/github-pool/providers/github
          service_account: vertex-sa@project-3bad66dc-6626-44e9-bf4.iam.gserviceaccount.com

      - name: Submit / schedule pipeline
        env:
          GCP_PROJECT_ID: project-3bad66dc-6626-44e9-bf4
          GCP_REGION: 'us-central1'
          GCS_BUCKET: gs://gcp_timeseries_ensemble_sanket
          GCS_PIPELINE_ROOT: gs://gcp_timeseries_ensemble_sanket/pipeline-root
          GCS_DRIFT_PREFIX: gs://gcp_timeseries_ensemble_sanket/drift
          GCS_MODEL_PREFIX: gs://gcp_timeseries_ensemble_sanket/models
          VERTEX_SA_EMAIL: vertex-sa@project-3bad66dc-6626-44e9-bf4.iam.gserviceaccount.com
        run: |
          if [ "${{ inputs.mode }}" = "schedule" ]; then
            uv run python deployment/deploy_pipeline.py \
              --pipeline "${{ inputs.pipeline }}" \
              --schedule "${{ inputs.cron }}"
          else
            uv run python deployment/deploy_pipeline.py \
              --pipeline "${{ inputs.pipeline }}" --submit
          fi
